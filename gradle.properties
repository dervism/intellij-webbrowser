org.gradle.jvmargs=-Xmx2048m -XX:+UseParallelGC
org.gradle.caching=true
org.gradle.configuration-cache=false

# The IntelliJ Platform already ships the Kotlin stdlib at runtime, so don't
# bundle it into the plugin (avoids verifier warnings and version conflicts).
kotlin.stdlib.default.dependency=false

# Path to the local IntelliJ install the plugin is built against. Uncomment and
# edit to point at a different install (e.g. a JetBrains Toolbox location) without
# touching build.gradle.kts. Can also be set via -PlocalIdePath=... or LOCAL_IDE_PATH.
#localIdePath=/Applications/IntelliJ IDEA.app
